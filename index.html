<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Onboarding Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        #access-overlay { transition: opacity 0.5s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <!-- ACCESS CONTROL OVERLAY -->
    <div id="access-overlay" class="fixed inset-0 bg-white z-[100] flex items-center justify-center p-4">
        <div class="max-w-md w-full text-center space-y-6">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-white text-2xl font-bold">GC</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-900">Corporate Access Required</h1>
            <p class="text-slate-500">Please enter your company email to continue to the onboarding portal.</p>
            <input type="email" id="email-input" placeholder="employee@gemini-coatings.com" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-hidden">
            <button onclick="checkAccess()" class="w-full bg-slate-900 text-white py-3 rounded-lg font-semibold hover:bg-slate-800 transition cursor-pointer">Verify Access</button>
            <p id="error-msg" class="text-red-500 text-sm hidden">Invalid domain. Use @gemini-coatings.com</p>
        </div>
    </div>

    <!-- HEADER -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <img src="image_1d6c3a.png.png" alt="Gemini Industries, Inc. Logo" class="h-12 w-auto object-contain">
            <span class="text-sm text-slate-500">Need help? <a href="mailto:helpdesk@gemini-coatings.com" class="text-blue-600 hover:underline">Contact IT Helpdesk</a></span>
        </div>
    </header>

    <!-- CONTENT -->
    <section class="bg-slate-900 text-white py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-4xl font-extrabold sm:text-5xl tracking-tight">Welcome to the Team! 🎉</h1>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 space-y-10">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <!-- Checklist -->
                <div class="bg-white rounded-xl shadow-xs border border-slate-200 p-6">
                    <h2 class="text-2xl font-bold mb-6">Your Onboarding Checklist</h2>
                    <div id="progress-bar" class="w-full bg-slate-100 rounded-full h-2 mb-8"><div id="progress-fill" class="bg-blue-600 h-2 rounded-full w-0 transition-all"></div></div>
                    <div class="space-y-4">
                        <label class="flex items-center gap-3 p-3 hover:bg-slate-50 rounded-lg cursor-pointer"><input type="checkbox" class="todo-item h-5 w-5"> <span>Review Safety Guidelines</span></label>
                        <label class="flex items-center gap-3 p-3 hover:bg-slate-50 rounded-lg cursor-pointer"><input type="checkbox" class="todo-item h-5 w-5"> <span>Configure Mobile Apps</span></label>
                    </div>
                </div>
                <!-- Directory -->
                <div class="bg-white rounded-xl shadow-xs border border-slate-200 p-6">
                    <h2 class="text-xl font-bold mb-4">Company Phone Directory</h2>
                    <input type="text" id="directory-search" onkeyup="filterDirectory()" placeholder="Search directory..." class="w-full px-4 py-2 border rounded-lg mb-4">
                    <div id="directory-results" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm"></div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="space-y-6">
                <div class="bg-slate-900 rounded-xl p-6 text-white">
                    <h3 class="font-bold text-blue-400 mb-4">📁 Bookmark Folder</h3>
                    <button id="copy-btn" onclick="copyNetworkPath()" class="w-full bg-blue-600 py-2 rounded-lg text-sm cursor-pointer">Copy Folder Path</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Access Logic
        function checkAccess() {
            const email = document.getElementById('email-input').value.trim().toLowerCase();
            if (email.endsWith("@gemini-coatings.com")) {
                document.getElementById('access-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('access-overlay').classList.add('hidden'), 500);
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        // Full Phone Directory Dataset
        const phoneDirectory = [
            { name: "Chris Hicks", phone: "(817) 247-9696", dept: "Executive Team", location: "Corporate" },
            { name: "Rodney Wickersham", phone: "(405) 834-1210", dept: "Executive Team", location: "Corporate" },
            // ... Add your full list here
        ];

        function filterDirectory() {
            const term = document.getElementById('directory-search').value.toLowerCase();
            const results = document.getElementById('directory-results');
            const filtered = phoneDirectory.filter(p => p.name.toLowerCase().includes(term) || p.dept.toLowerCase().includes(term));
            results.innerHTML = filtered.map(p => `<div class="p-3 border rounded-lg bg-slate-50"><p class="font-bold">${p.name}</p><p class="text-blue-600">${p.phone}</p><p class="text-xs text-slate-500">${p.dept}</p></div>`).join('');
        }

        function copyNetworkPath() {
            navigator.clipboard.writeText("\\\\gemfs\\Fileshare");
            const btn = document.getElementById('copy-btn');
            btn.innerText = "✓ Copied!";
            setTimeout(() => btn.innerText = "📋 Copy Folder Path", 2000);
        }
    </script>
</body>
</html>
