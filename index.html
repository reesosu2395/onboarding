<script>
    let currentUserEmail = null;

    // --- AUTHENTICATION WITH FLASK ---
    async function handleAuthSubmit(event) {
        event.preventDefault();
        const email = document.getElementById('auth-email').value.trim().toLowerCase();
        const password = document.getElementById('auth-password').value;
        const mode = currentAuthMode; // 'signup' or 'signin'

        const response = await fetch('/api/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, mode, name: document.getElementById('auth-username').value })
        });

        const result = await response.json();

        if (result.status === 'success') {
            initializeUserPortal(result.user);
        } else {
            showAuthError(result.message);
        }
    }

    // --- PERSIST PROGRESS TO PYTHON BACKEND ---
    async function saveCurrentProgress() {
        if (!currentUserEmail) return;

        const progress = {};
        checkboxes.forEach(box => {
            progress[box.getAttribute('data-id')] = box.checked;
        });

        await fetch('/api/save-progress', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: currentUserEmail, progress })
        });
    }

    function initializeUserPortal(userData) {
        currentUserEmail = userData.email;
        document.getElementById('user-display-name').innerText = userData.name;
        document.getElementById('welcome-name').innerText = userData.name;
        document.getElementById('user-avatar').innerText = userData.name.charAt(0).toUpperCase();

        // Apply progress states from backend
        checkboxes.forEach(box => {
            const stepId = box.getAttribute('data-id');
            box.checked = userData.progress[stepId] || false;
            
            // Visual feedback
            const title = box.nextElementSibling?.querySelector('.item-title') || box.nextElementSibling;
            if (box.checked && title) title.classList.add('line-through', 'text-slate-400');
        });

        updateProgress();
        document.getElementById('auth-overlay').classList.add('hidden');
    }

    // ... (Keep your existing updateProgress, filterDirectory, and copy functions here)
</script>
