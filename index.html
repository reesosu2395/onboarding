    <title>Corporate Onboarding - Phone Directory</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4">

    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Internal Phone Directory</h1>
            <p class="mt-2 text-sm text-gray-600">Quickly find contact information across all corporate offices and regional teams.</p>
        </div>

        <div class="mb-6">
            <label for="directory-search" class="sr-only">Search Directory</label>
            <div class="relative shadow-sm rounded-lg">
                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <input 
                    type="search" 
                    id="directory-search" 
                    class="block w-full p-4 pl-11 text-base text-gray-900 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" 
                    placeholder="Search by name, department, location, or extension..." 
                    onkeyup="filterDirectory()"
                    autocomplete="off"
                >
            </div>
        </div>

        <div id="directory-results" class="space-y-3">
            <div class="p-6 text-center bg-white rounded-lg border border-gray-200 shadow-sm text-gray-500">
                <svg class="w-12 h-12 mx-auto text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <p class="text-base font-medium text-gray-700">Ready to search</p>
                <p class="text-sm text-gray-400 mt-1">Type a team member's name, city, or extension above.</p>
            </div>
        </div>
    </div>

        function filterDirectory() {
            const searchInput = document.getElementById('directory-search').value.toLowerCase().trim();
            const resultsContainer = document.getElementById('directory-results');
            
            // Reset to clean placeholder if entry is empty
            if (searchInput === '') {
                resultsContainer.innerHTML = `
                    <div class="p-6 text-center bg-white rounded-lg border border-gray-200 shadow-sm text-gray-500">
                        <svg class="w-12 h-12 mx-auto text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                        <p class="text-base font-medium text-gray-700">Ready to search</p>
                        <p class="text-sm text-gray-400 mt-1">Type a team member's name, city, or extension above.</p>
                    </div>
                `;
                return;
            }
            
            // Execute cross-field string matching
            const filtered = phoneDirectory.filter(contact => {
                return contact.name.toLowerCase().includes(searchInput) || 
                       contact.phone.toLowerCase().includes(searchInput) ||
                       contact.location.toLowerCase().includes(searchInput);
            });
            
            // Render outputs
            resultsContainer.innerHTML = '';
            if (filtered.length > 0) {
                filtered.forEach(contact => {
                    const isExt = contact.type === "Extension";
                    const cleanPhone = contact.phone.replace(/[^\d+]/g, '');
                    const callHref = isExt ? `tel:${contact.phone}` : `tel:${cleanPhone}`;

                    const contactCard = `
                        <div class="p-4 bg-white rounded-lg border border-gray-200 shadow-sm flex justify-between items-center hover:bg-gray-50 transition-colors">
                            <div>
                                <h4 class="text-base font-semibold text-gray-900">${contact.name}</h4>
                                <p class="text-xs text-gray-500 font-medium uppercase tracking-wider mt-0.5">${contact.location}</p>
                            </div>
                            <div class="text-right">
                                <a href="${callHref}" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-semibold text-blue-700 bg-blue-50 rounded-md hover:bg-blue-100 transition-colors">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                                    </svg>
                                    ${isExt ? 'Ext. ' + contact.phone : contact.phone}
                                </a>
                            </div>
                        </div>
                    `;
                    resultsContainer.innerHTML += contactCard;
                });
            } else {
                resultsContainer.innerHTML = `
                    <div class="p-8 text-center bg-gray-50 rounded-lg border border-dashed border-gray-300 text-gray-500">
                        <p class="text-base font-medium">No matches found</p>
                        <p class="text-sm text-gray-400 mt-1">We couldn't find anyone matching "${searchInput}". Check your spelling or try searching by city.</p>
                    </div>
                `;
            }
        }
